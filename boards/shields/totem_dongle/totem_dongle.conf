# ZMK Display enablement
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Display thread configuration
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096

# Battery level fetching from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# YADS Dongle Screen - Brightness configuration
CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=80
CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=1
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=600
CONFIG_DONGLE_SCREEN_BRIGHTNESS_STEP=10

# APDS9960 ambient light sensor is NOT enabled (hardware omitted)
# CONFIG_DONGLE_SCREEN_AMBIENT_LIGHT is left unset (defaults to n)
