include:
  # Dongle with Prospector operator screen
  - board: xiao_ble//zmk
    shield: totem_dongle prospector_adapter
    artifact-name: totem_dongle
  # Dongle settings reset
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings_reset_dongle
  # Keyboard halves as peripherals
  - board: xiao_ble//zmk
    shield: totem_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: xiao_ble//zmk
    shield: totem_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  # Keyboard settings reset
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings_reset_keyboard

